name: Build and Publish API Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "src/**"
      - "configs/config.yaml"
      - "requirements.txt"
      - "pyproject.toml"
      - "serve.dockerfile"
      - ".github/workflows/docker-publish.yml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  DOCKER_HUB_REPOSITORY: ${{ secrets.DOCKER_HUB_REPOSITORY }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build serving image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./serve.dockerfile
          push: false
          tags: mlops-crew-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_TOKEN }}

      - name: Extract Docker image metadata
        if: github.event_name == 'push' && env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_REPOSITORY != ''
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPOSITORY }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push serving image
        if: github.event_name == 'push' && env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_TOKEN != '' && env.DOCKER_HUB_REPOSITORY != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./serve.dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

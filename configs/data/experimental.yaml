# Experimental data configuration
# Uses larger TF-IDF vocab and different split ratio
raw_path: data/raw/phishing_email.csv
cleaned_path: data/processed/cleaned.csv
train_path: data/processed/train.csv
val_path: data/processed/val.csv
test_path: data/processed/test.csv

# Cleaning settings
min_text_length: 5

# Split settings
test_size: 0.10
val_size: 0.10
random_seed: 123

# TF-IDF settings
tfidf:
  max_features: 20000
  ngram_range: [1, 3]
  sublinear_tf: true
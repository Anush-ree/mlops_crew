# Single source of truth for paths, splits, and model hyperparameters.
# Every script and DVC stage reads from this file. To swap in a new dataset,
# update `data.raw_dir` / `data.raw_file` and re-run `dvc repro`.

project:
  name: phishing_email_detection
  seed: 42
  phase: 2

data:
  raw_dir: data/raw/archive
  raw_file: phishing_email.csv
  text_column: text_combined
  label_column: label

  interim_dir: data/interim
  sampled_file: phishing_email_phase2_sample.csv
  phase1_reference_file: phishing_email_phase1_reference.csv
  phase2_increment_file: phishing_email_phase2_increment.csv
  phase3_holdout_file: phishing_email_phase3_holdout.csv
  source_manifest_file: source_manifest.csv

  processed_dir: data/processed
  cleaned_file: cleaned.csv
  train_file: train.csv
  val_file: val.csv
  test_file: test.csv
  transformer_dir: transformer

  sample:
    fraction: 0.80
    random_state: 42
    stratify: true
    phase1_fraction: 0.60
    phase2_increment_fraction: 0.20
    phase3_holdout_fraction: 0.20
  split:
    train_size: 0.70
    val_size: 0.15
    test_size: 0.15
    random_state: 42
    stratify: true
  source_order:
    - name: enron
      file: Enron.csv
    - name: ling
      file: Ling.csv
    - name: ceas_08
      file: CEAS_08.csv
    - name: spamassassin
      file: SpamAssasin.csv
    - name: nigerian_fraud
      file: Nigerian_Fraud.csv
    - name: nazario
      file: Nazario.csv

cleaning:
  lowercase: true
  normalize_whitespace: true
  drop_duplicates: true
  min_text_length: 3

features:
  tfidf:
    max_features: 20000
    ngram_range: [1, 2]
    min_df: 2
    max_df: 0.95
    sublinear_tf: true
    strip_accents: unicode
    token_pattern: '(?u)\b\w\w+\b'

modeling:
  output_dir: models
  models: [dummy, logistic_regression, linear_svc, complement_nb]
  primary_metric: f2
  positive_label: 1
  dummy:
    strategy: most_frequent
  logistic_regression:
    C: 1.0
    class_weight: balanced
    max_iter: 1000
    solver: liblinear
  linear_svc:
    C: 1.0
    class_weight: balanced
    max_iter: 5000
  complement_nb:
    alpha: 0.5

reports:
  metrics_dir: reports/metrics
  predictions_dir: reports/predictions
  divergence_dir: reports/divergence
  monitoring_dir: reports/monitoring
  profiling_dir: reports/profiling

tracking:
  enabled: true
  experiment_name: phishing-email-phase2
  tracking_uri: file:./mlruns
  log_models: true
  log_predictions: true
  tags:
    data_version: phase2_80pct
    model_version: phase2_v2
    pipeline_version: dvc_phase2
    logging_version: rich_rotating_v2
    hydra_config_version: phase2_hydra_v1

logging:
  version: rich_rotating_v2
  level: INFO
  log_dir: logs
  log_file: pipeline.log
  max_bytes: 10485760
  backup_count: 5
  rich_tracebacks: true

monitoring:
  resource_sample_seconds: 1.0
  top_new_tokens: 50
